<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <!-- 引入外部CSS -->
    <link rel="stylesheet" href="lab2-2503-075-index.css">
</head>
<body>

<!-- 头部：固定定位 + 浮动 -->
<header class="header">
    <div class="logo">
        <img src="https://ts2.tc.mm.bing.net/th/id/OIP-C.6fxesIOCeQh-1TeZ82a8dQHaFj?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo">
    </div>
    <ul class="nav">
        <li>首页</li>
        <li>文学小说</li>
        <li>科技编程</li>
        <li>经济管理</li>
        <li>联系我们</li>
    </ul>
</header>

<!-- 主体容器 -->
<div class="container">

    <!-- 左侧栏：相对定位 -->
    <aside class="left">
        <h2>图书分类</h2>
        <ul class="category">
            <li>计算机图书</li>
            <li>文学名著</li>
            <li>少儿读物</li>
            <li>考试考证</li>
            <li>历史传记</li>
        </ul>
    </aside>

    <!-- 中间内容区 -->
    <main class="middle">
        <h2>图书展示区</h2>
        <div class="book-box">
            <!-- 父相子绝：父元素相对定位 -->
            <div class="book-item">
                <img src="https://ts2.tc.mm.bing.net/th/id/OIP-C.Qcioj2UPhuj75jikY2YxrwHaKB?rs=1&pid=ImgDetMain&o=7&rm=3" alt="图书封面">
                <!-- 子元素绝对定位 -->
                <div class="hot-tag">热销</div>
                <!-- 悬停显示 -->
                <div class="show-info">点击查看详情</div>
            </div>
        </div>

        <h2>热门推荐</h2>
        <div class="recommend">
            <div class="rec-item">推荐1</div>
            <div class="rec-item">推荐2</div>
            <div class="rec-item">推荐3</div>
        </div>

        <h2>新书上市</h2>
        <table class="new-book">
            <tr>
                <th>书名</th>
                <th>价格</th>
                <th>出版时间</th>
            </tr>
            <tr>
                <td>HTML从入门到精通</td>
                <td>59元</td>
                <td>2025-01</td>
            </tr>
            <tr>
                <td>CSS实战</td>
                <td>49元</td>
                <td>2025-02</td>
            </tr>
        </table>
    </main>

    <!-- 右侧栏：固定定位 -->
    <aside class="right">
        <h3>促销广告</h3>
        <p>满100减20</p>
        <p>新用户立减10元</p>
    </aside>
</div>

</body>
</html>
